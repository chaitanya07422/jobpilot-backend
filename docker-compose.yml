# Local development — MongoDB, Redis, Qdrant
# Usage: docker compose up -d
# Stop:  docker compose down

services:
  mongodb:
    image: mongo:7
    container_name: jobpilot-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: jobpilot
    volumes:
      - jobpilot_mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobpilot-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - jobpilot_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: jobpilot-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - jobpilot_qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'bash -c "exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q ok"']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  jobpilot_mongodb_data:
  jobpilot_redis_data:
  jobpilot_qdrant_data:
