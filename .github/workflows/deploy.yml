name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy API to Oracle VM
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ${{ secrets.APP_DIR }}
            git fetch origin main
            git checkout main
            git pull origin main
            npm ci
            npm run build
            pm2 reload jobpilot-api --update-env || pm2 start dist/main.js --name jobpilot-api
            pm2 save
