name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
        env:
          PORT: 3000
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/jobpilot-test
          QDRANT_URL: https://example.cloud.qdrant.io
          QDRANT_API_KEY: test-qdrant-key
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_ACCESS_SECRET: test-access-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          RESEND_API_KEY: re_test_key
          FRONTEND_URL: http://localhost:5173
          ADMIN_API_KEY: test-admin-key
          HEALTH_CHECK_QDRANT: 'false'

      - name: Build
        run: npm run build

  deploy:
    name: Deploy API to Oracle VM
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ${{ secrets.APP_DIR }}
            git fetch origin main
            git checkout main
            git pull origin main
            npm ci
            npm run build
            pm2 reload jobpilot-api --update-env || pm2 start dist/main.js --name jobpilot-api
            pm2 save
